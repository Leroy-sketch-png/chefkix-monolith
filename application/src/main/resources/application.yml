# ═══════════════════════════════════════════════════════════════
# ChefKix Modular Monolith — Unified Configuration
# ═══════════════════════════════════════════════════════════════
# This replaces 5 separate application.yml files + gateway routing.
# All services now run in a single JVM on port 8080.
# ═══════════════════════════════════════════════════════════════

server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: chefkix-monolith

  # ── MongoDB (single database, consolidated from 5) ──
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chefkix}
      auto-index-creation: true
    web:
      pageable:
        max-page-size: 100

  # ── Redis (OTP rate limiting, token blacklisting) ──
    redis:
      host: localhost
      port: 6379
      password: ${SPRING_DATA_REDIS_PASSWORD:chefkix-dev-password}
      database: 0

  # ── Kafka ──
  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.chefkix.shared.event"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ── Security (Keycloak JWT) ──
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/nottisn

# ── Keycloak IDP (identity module — admin client) ──
# SECURITY: Use env vars in production. Defaults here are PLACEHOLDERS for documentation only.
idp:
  url: ${IDP_URL:http://localhost:8180}
  client-id: ${IDP_CLIENT_ID:chefkix-be}
  client-secret: ${IDP_CLIENT_SECRET:PxyXoeJ7HSkw94ZU3eBpqdbG3P0PnOfL}

keycloak:
  auth-server-url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: nottisn
  resource: chefkix-be
  credentials:
    secret: ${IDP_CLIENT_SECRET:PxyXoeJ7HSkw94ZU3eBpqdbG3P0PnOfL}

# ── OTP Configuration (identity module) ──
app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:3000}
  cookie:
    domain: ${APP_COOKIE_DOMAIN:localhost}
    secure: ${APP_COOKIE_SECURE:false}
  otp:
    secret: ${APP_OTP_SECRET:chefkix-dev-otp-secret-change-in-prod}
    ttl-seconds: 600
    max-attempts: 5
    max-resend-per-hour: 3
    max-resend-per-day: 10
    max-verify-attempts: 5
    base-cooldown: 60
  signup:
    cleanup-millis: 3600000
  services:
    ai-url: ${AI_SERVICE_URL:http://localhost:8000}
    ai-api-key: ${AI_SERVICE_API_KEY:}

# ── Email — Brevo (notification module) ──
notification:
  email:
    brevo-url: https://api.brevo.com
    brevo-apikey: ${BREVO_API_KEY:}

# ── Cloudinary (culinary module — image uploads) ──
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:CHANGE_ME}
  api-key: ${CLOUDINARY_API_KEY:CHANGE_ME}
  api-secret: ${CLOUDINARY_API_SECRET:CHANGE_ME}

# ── Logging (sensible defaults, not microservice DEBUG spam) ──
logging:
  level:
    com.chefkix: INFO
    org.springframework.security: WARN
    org.springframework.web.socket: WARN
    org.springframework.messaging: WARN

# ── Swagger / OpenAPI ──
# Enable in development: set SPRINGDOC_ENABLED=true. Disabled by default for production safety.
springdoc:
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}

# ── ChefKix Custom Configuration ──
chefkix:
  push:
    enabled: ${PUSH_ENABLED:false}  # Set to true and provide FIREBASE_SERVICE_ACCOUNT_JSON to enable
  typesense:
    host: ${TYPESENSE_HOST:localhost}
    port: ${TYPESENSE_PORT:8108}
    protocol: ${TYPESENSE_PROTOCOL:http}
    api-key: ${TYPESENSE_API_KEY:chefkix-typesense-dev-key}
  grocery:
    affiliate:
      enabled: ${GROCERY_AFFILIATE_ENABLED:false}
      partner-tag: ${GROCERY_AFFILIATE_PARTNER_TAG:chefkix-app}
      base-url: ${GROCERY_AFFILIATE_BASE_URL:https://www.instacart.com}
